name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          python -m pip install -U pip
          pip install -e packages/core
          pip install -e packages/api
          pip install "httpx>=0.26,<0.28" pytest pytest-asyncio
      - name: Pytest (offline)
        env:
          CSV_DATA_DIR: packages/core/tests/fixtures/sample_prices
          FUNDAMENTALS_FILE: packages/core/tests/fixtures/sample_prices/fundamentals.csv
          DATABASE_URL: sqlite:///:memory:
        run: |
          export PYTHONPATH=packages/core:packages/api
          pytest packages/core/tests packages/api/tests -q -m "not network"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci || npm install
      - run: npm test
      - run: npm run build
